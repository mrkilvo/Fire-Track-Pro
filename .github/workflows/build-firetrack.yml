name: Build FireTrack Image

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout frappe_docker
        uses: actions/checkout@v4
        with:
          repository: frappe/frappe_docker
          path: frappe_docker

      - name: Create apps.json
        run: |
          cat > frappe_docker/apps.json <<'EOF'
          [
            {
              "url": "https://github.com/frappe/erpnext",
              "branch": "version-16"
            },
            {
              "url": "https://github.com/frappe/hrms",
              "branch": "version-16"
            },
            {
              "url": "https://github.com/mrkilvo/Fire-Track-Pro.git",
              "branch": "main"
            }
          ]
          EOF

      - name: Set image tags
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          BUILD_TAG="v16-${GITHUB_RUN_NUMBER}-${SHORT_SHA}"
          echo "BUILD_TAG=${BUILD_TAG}" >> "$GITHUB_ENV"
          echo "IMAGE_NAME=ghcr.io/mrkilvo/erpnext-firetrackpro-hrms" >> "$GITHUB_ENV"

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin

      - name: Patch Dockerfile for private repo
        working-directory: frappe_docker
        run: |
          cp images/custom/Containerfile images/custom/Containerfile.firetrack

          # Add git_token secret mount
          sed -i 's|id=apps_json,target=/opt/frappe/apps.json,uid=1000,gid=1000|id=apps_json,target=/opt/frappe/apps.json,uid=1000,gid=1000 --mount=type=secret,id=git_token,target=/opt/frappe/git_token,uid=1000,gid=1000|g' images/custom/Containerfile.firetrack

          # Inject git auth BEFORE bench init
          sed -i '/export APP_INSTALL_ARGS=/a\
          export GIT_TOKEN=$(cat /opt/frappe/git_token | tr -d "\\r\\n") && \
          git config --global url."https://x-access-token:${GIT_TOKEN}@github.com/mrkilvo/Fire-Track-Pro.git".insteadOf "https://github.com/mrkilvo/Fire-Track-Pro.git" && \
          ' images/custom/Containerfile.firetrack

      - name: Build image
        working-directory: frappe_docker
        env:
          DOCKER_BUILDKIT: "1"
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          docker build \
            --progress=plain \
            --secret id=apps_json,src=apps.json \
            --secret id=git_token,env=GIT_TOKEN \
            --build-arg FRAPPE_BRANCH=version-16 \
            --file images/custom/Containerfile.firetrack \
            --tag "${IMAGE_NAME}:${BUILD_TAG}" \
            --tag "${IMAGE_NAME}:latest" \
            .

      - name: Push image
        run: |
          docker push "${IMAGE_NAME}:${BUILD_TAG}"
          docker push "${IMAGE_NAME}:latest"

      - name: Show image tags
        run: |
          echo "Built and pushed:"
          echo "${IMAGE_NAME}:${BUILD_TAG}"
          echo "${IMAGE_NAME}:latest"
